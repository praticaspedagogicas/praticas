<!doctype html>
<!-- V41 Forms: participação externa sem Power Automate -->
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>Debrief Pedagógico — Práticas em Balanço</title>
<style>
:root{
  --red:#E31E24;
  --red-dark:#9F1F2A;
  --red-deep:#761722;
  --red-soft:#FFF5F5;
  --black:#111111;
  --ink:#242424;
  --muted:#696969;
  --line:#D9D9D9;
  --soft:#F5F5F5;
  --paper:#FFFFFF;
  --orange:#F7931E;
  --shadow:0 20px 60px rgba(0,0,0,.10);
  --shadow-soft:0 8px 24px rgba(0,0,0,.07);
  --radius:24px;
  --sidebar:286px;
  --topbar:82px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  font-family:"Century Gothic","Avenir Next","Segoe UI",Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 88% 8%,rgba(227,30,36,.08),transparent 24%),
    radial-gradient(circle at 10% 94%,rgba(17,17,17,.055),transparent 25%),
    linear-gradient(135deg,#F7F7F7 0%,#FFFFFF 46%,#F3F3F3 100%);
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;inset:0;pointer-events:none;z-index:-1;
  background-image:
    linear-gradient(rgba(0,0,0,.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,.022) 1px,transparent 1px);
  background-size:46px 46px;
  mask-image:linear-gradient(to bottom,black,transparent 88%);
}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:3px solid rgba(227,30,36,.22);outline-offset:2px}
.hidden{display:none!important}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* top bar */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:80;height:var(--topbar);
  display:grid;grid-template-columns:minmax(230px,var(--sidebar)) 1fr auto;align-items:center;gap:22px;
  padding:0 22px;background:rgba(255,255,255,.94);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(0,0,0,.10);box-shadow:0 4px 18px rgba(0,0,0,.035)
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand img{width:120px;height:42px;object-fit:contain;object-position:left center;display:block}
.brand-copy{min-width:0;border-left:2px solid var(--red);padding-left:12px}
.brand-kicker{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--red-dark);font-weight:800;margin-bottom:3px}
.brand-title{font-size:12px;line-height:1.15;font-weight:800;color:var(--black);white-space:normal}
.top-progress{min-width:0}
.progress-meta{display:flex;justify-content:space-between;gap:12px;font-size:11px;color:var(--muted);margin-bottom:7px;font-weight:700}
.progress-track{height:7px;background:#EBEBEB;border-radius:999px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
.progress-fill{width:0;height:100%;background:linear-gradient(90deg,var(--red),var(--red-dark),var(--black));transition:width .5s ease;border-radius:inherit}
.top-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:42px;height:42px;border-radius:13px;border:1px solid #D8D8D8;background:#fff;color:var(--black);display:grid;place-items:center;transition:.18s}
.icon-btn:hover{transform:translateY(-1px);border-color:#AAA;box-shadow:var(--shadow-soft)}
.icon-btn svg{width:19px;height:19px}

/* sidebar */
.sidebar{
  position:fixed;top:var(--topbar);bottom:0;left:0;z-index:50;width:var(--sidebar);
  padding:22px 17px 26px;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);
  border-right:1px solid rgba(0,0,0,.10);overflow:hidden
}
