<!DOCTYPE html>
<html lang="pt">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Guião CBL - Práticas Pedagógicas</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 font-family: 'Century Gothic', 'Segoe UI', sans-serif;
 background: #f5f5f5;
 color: #333;
 line-height: 1.6;
 padding: 20px;
 }
 .page {
 max-width: 950px;
 margin: 0 auto;
 background: white;
 padding: 20px 50px;
 
 box-shadow: 0 4px 20px rgba(0,0,0,0.1);
 }
 h1 {
 font-family: 'Century Gothic', sans-serif;
 font-size: 24px;
 font-weight: bold;
 text-align: center;
 margin: 0 0 8px 0;
 color: #333;
 border-bottom: 2px solid #E31E24;
 padding-bottom: 15px;
 }
 .header {
 text-align: center;
 margin-bottom: 30px;
 }
 .header img {
 display: block;
 margin: 0 auto 15px;
 height: 40px;
 }

 table {
 width: 100%;
 border-collapse: collapse;
 margin-bottom: 25px;
 }
 th, td {
 border: 1px solid #333; font-size: 14px;
 padding: 10px;
 text-align: left;
 }
 th {
 background: #f5f5f5;
 font-weight: bold;
 font-size: 14px;
 }
 input[type="text"], textarea {
 width: 100%;
 padding: 10px;
 border: 1px solid #333; font-size: 14px;
 
 font-family: inherit;
 font-size: 14px;
 }
 td input:focus, td textarea:focus, td select:focus {
 outline: none;
 border-color: #999;
 background: white;
 }
 textarea {
 min-height: 120px;
 resize: vertical;
 }

 .section {
 background: white;
 padding: 0;
 
 margin: 10px 0;
 
 
 }
 .section h3 {
 margin: 0 0 20px 0;
 border-bottom: 2px solid #E31E24;
 padding-bottom: 10px;
 font-size: 18px;
 }

 label {
 display: block;
 font-weight: bold;
 margin: 6px 0 3px 0;
 color: #333;
 font-size: 14px;
 }
 label:first-child {
 margin-top: 0;
 }

 .hint {
 font-size: 11px;
 color: #888;
 font-weight: normal;
 }

 .btn-group {
 margin-top: 15px;
 display: flex;
 gap: 15px;
 }
 .btn {
 padding: 14px 28px;
 border: none;
 border-radius: 10px;
 font-size: 15px;
 font-weight: bold;
 cursor: pointer;
 }
 .btn-primary {
 background: #333;
 color: white;
 }
 .btn-secondary {
 background: white; border: 1px solid #333;
 color: #333;
 }
 .btn:hover {
 opacity: 0.9;
 }

 @media print {
 .no-print { display: none; }
 .page { box-shadow: none; }
 }
 </style>
</head>

 <table>
 <tr>
 <th>Curso:</th>
 <td><input type="text" id="curso" placeholder="Nome do curso"></td>
 <th>Unidades Curriculares:</th>
 <td><input type="text" id="uc" placeholder="UCs envolvidas"></td>
 </tr>
 <tr>
 <th>Ano Letivo:</th>
 <td><input type="text" id="ano" ></td>
 <th>Professor/a(es):</th>
 <td><input type="text" id="professor" placeholder="Professor/a(es)"></td>
 </tr>
 </table>

 <div style="margin-top:15px">
 <div style="text-align:center;margin:5px 0 0 0;font-weight:bold">Autoria:</div>
 <input type="text" id="autoria" placeholder="Professor/a(es)">
 

 
 <label>Estado do Guião:</label>
 <input type="text" id="estado" placeholder="Novo / Atualizado / Reutilizado">
 
 <label>Número de Estudantes:</label>
 <input type="text" id="n_estudantes" placeholder="Ex: 30">
 <label>Conteúdo(s) alinhados com os Conteúdos Programáticos da FUC:</label>
 <textarea id="conteudos" placeholder="Liste os conteúdos programáticos..."></textarea>
 <label>Organização(ões) (contacto):</label>
 <input type="text" id="organizacao" placeholder="Empresa/organização parceira">
 </div>

 <div class="section">
 <h3>Desafio</h3>
 <label>Desafio:</label>
 <textarea id="desafio" placeholder="Descreva o problema real que os estudantes vão resolver..."></textarea>
 <label>Objetivos de Aprendizagem (ponderações) alinhados com os Objetivos da FUC:</label>
 <textarea id="objetivos" placeholder="• Objetivo 1 (XX%) - verbo&#10;• Objetivo 2 (XX%) - verbo"></textarea>
 </div>

 <div class="section">
 <h3>Entregas</h3>
 <label>Documento Escrito:</label>
 <input type="text" id="doc_escrito" placeholder="Descrição do documento">
 <label>Apresentação Final:</label>
 <input type="text" id="apresentacao" placeholder="Descrição da apresentação">
 </div>

 <div class="section">
 <h3>Avaliação</h3>
 <label>Ponderação do CBL na Avaliação Contínua:</label>
 <input type="text" id="pond_total" placeholder="xx%">
 <label>Ponderação - Documento Escrito:</label>
 <input type="text" id="pond_doc" placeholder="xx%">
 <label>Ponderação - Apresentação Final:</label>
 <input type="text" id="pond_apres" placeholder="xx%">
 </div>

 <div class="section">
 <h3>Calendarização</h3>
 <label>Data e Hora:</label>
 <input type="text" id="calendarizacao" placeholder="DD/MM/AAAA, HH:MM - HH:MM">
 </div>

 <div class="btn-group no-print">
 <button class="btn btn-primary" onclick="gerarGuiao()">Gerar Guião</button>
 <button class="btn btn-secondary" onclick="guardar()">Guardar</button>
 <button class="btn btn-secondary" onclick="window.print()">Salvar PDF</button>
 </div>
</div>



<script>
function guardar() {
  var dados = {}; 
  var campos = ["curso","uc","ano","professor","autoria","desafio","recursos"];
  for(var i=0; i<campos.length; i++){
    var el = document.getElementById(campos[i]);
    if(el && el.value) dados[campos[i]] = el.value;
  }
  localStorage.setItem("cbl_plano", JSON.stringify(dados));
  alert("Plano guardado!");
}
</script>
<script>
function lerParametros() {
  var urlParams = new URLSearchParams(window.location.search);
  for (var pair of urlParams.entries()) {
    var el = document.getElementById(pair[0]);
    if (el) el.value = decodeURIComponent(pair[1]);
  }
}
window.onload = lerParametros;
</script><script>
function gerarGuiao() {
  alert("Guião criado! Use Salvar PDF para exportar.");
}
</script>
