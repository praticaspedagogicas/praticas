<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>Debrief Pedagógico — Práticas em Balanço</title>
<style>
html,body{margin:0;min-height:100%;font-family:"Century Gothic","Avenir Next","Segoe UI",Arial,sans-serif;background:#f5f5f5;color:#222}.loading{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}.loading strong{display:block;font-size:23px;margin-bottom:9px}.loading span{display:block;color:#666;line-height:1.5}.error{color:#9f1f2a;max-width:680px;line-height:1.5}button{margin-top:18px;padding:11px 17px;border:0;border-radius:999px;background:#e31e24;color:#fff;font:inherit;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div class="loading" id="loading"><div><strong>Debrief Pedagógico</strong><span>A restaurar a versão estável…</span></div></div>
<script>
(async()=>{
  const loading=document.getElementById('loading');
  const target=new URL('app-v58-dilemas.html?v=58d',location.href);

  try{
    if(!('serviceWorker' in navigator))throw new Error('Este navegador não permite carregar a versão estável desta página.');

    const registration=await navigator.serviceWorker.register('./sw_v58_restore.js?v=58d',{scope:'./',updateViaCache:'none'});
    await registration.update();
    await navigator.serviceWorker.ready;

    if(!navigator.serviceWorker.controller){
      await new Promise(resolve=>{
        const timeout=setTimeout(resolve,1800);
        navigator.serviceWorker.addEventListener('controllerchange',()=>{clearTimeout(timeout);resolve()},{once:true});
      });
    }

    location.replace(target.href);
  }catch(error){
    loading.innerHTML=`<div class="error"><strong>Não foi possível abrir o Debrief.</strong><span>${String(error?.message||error)}</span><button onclick="location.reload()">Tentar novamente</button></div>`;
  }
})();
</script>
</body>
</html>
