name: Atualizar exemplos de email PROJ-BL

on:
  push:
    branches:
      - main
    paths:
      - '.projbl_email_update/**'

permissions:
  contents: write

jobs:
  aplicar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Obter repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar zstd
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Atualizar apenas o template normal
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object PROJ-BL.html)" = "7a67646ae47b4c4c8bdeb6de6b680662c5fff4d4"
          zstd -q -d --patch-from=PROJ-BL.html \
            .projbl_email_update/projbl_email_examples.zstpatch \
            -o PROJ-BL.html.novo
          echo "ceed5987ef1814df83edcf202de6b75fe65966cbddb047153e66753653dd9664  PROJ-BL.html.novo" | sha256sum -c -
          mv PROJ-BL.html.novo PROJ-BL.html
          rm -rf .projbl_email_update

      - name: Publicar alteração
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- PROJ-BL.html .projbl_email_update
          git commit -m "Uniformiza exemplos de email no PROJ-BL"
          git push
