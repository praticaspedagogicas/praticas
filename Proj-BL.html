<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecionar PROJ-BL</title>
<script>
(function(){
  var target = new URL('Proj-BL.html', window.location.href);
  target.search = window.location.search;
  target.hash = window.location.hash;
  window.location.replace(target.href);
})();
</script>
</head>
<body>
  <p>A redirecionar para <a id="fallback" href="Proj-BL.html">Proj-BL.html</a>...</p>
  <script>
  (function(){
    var target = new URL('Proj-BL.html', window.location.href);
    target.search = window.location.search;
    target.hash = window.location.hash;
    var a = document.getElementById('fallback');
    if (a) a.href = target.href;
  })();
  </script>
</body>
</html>
