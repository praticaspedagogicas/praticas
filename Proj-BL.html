<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano Proj-BL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Century Gothic', sans-serif; background: #f5f5f5; padding: 15px; }
.page { max-width: 900px; margin: 0 auto; background: white; padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.logo { text-align: center; margin-bottom: 15px; }
.logo img { height: 40px; }
h1 { text-align: center; border-bottom: 2px solid #E31E24; padding-bottom: 15px; margin-bottom: 20px; }
.section { margin: 12px 0; padding: 10px; border: 1px solid #333; }
.section label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 12px; }
input, textarea, select { width: 100%; padding: 6px; border: 1px solid #333; border-radius: 3px; font-size: 12px; box-sizing: border-box; }
textarea { min-height: 60px; }
.tabs { display: flex; border-bottom: 2px solid #E31E24; }
.tab { padding: 8px 15px; cursor: pointer; background: #eee; border: none; font-size: 12px; }
.tab.active { background: #E31E24; color: white; }
.tab-content { display: none; padding: 12px 0; }
.tab-content.active { display: block; }
.quadro-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 9px; table-layout: fixed; word-wrap: break-word; }
.quadro-table th, .quadro-table td { padding: 4px; border: 1px solid #333; vertical-align: top; }
.quadro-table th { background: #fff; font-size: 10px; text-align: left; }
.quadro-table input { border: none; background: transparent; width: 100%; font-size: 9px; }
.btn-preto { background: #333; color: #fff; border: 1px solid #000; padding: 8px 20px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.btn { background: #FF6B00; color: white; border: none; padding: 8px 20px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.legend { background: #f0f0f0; padding: 10px; border: 1px solid #ccc; margin: 10px 0; font-size: 10px; }
.legend div { margin-bottom: 3px; }
.calculated { background: #ffcccc; color: #cc0000; font-weight: bold; }
.header-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.header-info .section { margin: 5px 0; }
@media print {
  .no-print, button, .btn, .btn-preto { display: none !important; }
  .tab { display: none !important; }
  .tab-content { display: block !important; margin-bottom: 20px; page-break-before: always; }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @page { margin: 1cm; size: A4; }
}
@media print {
  .no-print, button, .btn, .btn-preto { display: none !important; }
  .tab { display: none !important; }
  .tab-content { display: block !important; margin-bottom: 20px; page-break-before: always; }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @page { margin: 1cm; size: A4; }
}
@media print {
  .no-print, button, .btn, .btn-preto { display: none !important; }
  .tab { display: none !important; }
  .tab-content { display: block !important; margin-bottom: 20px; page-break-before: always; }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @page { margin: 1cm; size: A4; }
}
  @media print {
    .no-print, button, .btn, .btn-preto, .btn-plus, .btn-minus,
    button[title="Saiba mais"] { display: none !important; }
    .page, .logo { box-shadow: none !important; }
    .tab { display: none !important; }
    .tab-content { display: block !important; }
  }
</style>

function addDocente() {
  var t = document.querySelector('.section table');
  if (t) { var r=t.insertRow(-1); r.innerHTML='<td><input></td><td><input></td>'; }
}
function addUC() {
  document.querySelectorAll('.quadro-table').forEach(function(t) {
    if (t.rows[0] && t.rows[0].cells[0].textContent.trim()==='UC') {
      var r=t.insertRow(-1); r.innerHTML='<td><input></td><td><input></td>';
    }
  });
}
function addMetodologiaUC() {
  document.querySelectorAll('.quadro-table').forEach(function(t) {
    var h=t.rows[0];
    if (h && h.cells.length===4 && h.cells[0].textContent.includes('UC')) {
      var r=t.insertRow(-1); r.innerHTML='<td><input></td><td><input></td><td><input></td><td><input></td>';
    }
  });
}
function addSemana() {
  document.querySelectorAll('.quadro-table').forEach(function(t) {
    var h=t.rows[0];
    if (h && h.cells.length===5 && h.cells[0].textContent.includes('Semana')) {
      var n=t.rows.length; var r=t.insertRow(-1);
      r.innerHTML='<td><input placeholder="'+n+'ª semana"></td><td><input></td><td><input></td><td><input placeholder="DD/MM"></td><td><input type="number"></td>';
    }
  });
}
function addContrib() {
  document.querySelectorAll('.quadro-table').forEach(function(t) {
    var h=t.rows[0];
    if (h && h.cells.length===6 && h.cells[1].textContent.includes('UNIDADE')) {
      var r=t.insertRow(-1); r.innerHTML='<td><input type="number"></td><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td>';
    }
  });
}
function addCriterio(btn) {
  var d=btn.parentNode, l=document.createElement('div');
  l.innerHTML='• <input placeholder="Descrição de critério" style="border:none;background:transparent;width:90%;">';
  d.insertBefore(l,btn);
}
function addUC_Aval() {
  var c=document.querySelector('#avaliacao .section');
  if (!c) return;
  var d=document.createElement('div'); d.style.marginBottom='15px';
  d.innerHTML='<div><label>Nome da UC:</label><input placeholder="Ex: Gestão de Projetos" style="margin-bottom:8px;"></div>'
    +'<div style="padding-left:10px;">'
    +'<div>• <input placeholder="Critério" style="border:none;background:transparent;width:90%;"></div>'
    +'<button onclick="addCriterio(this)" style="padding:3px 8px;cursor:pointer;margin-top:3px;font-size:10px;">+ Adicionar critério</button>'
    +'</div>';
  c.appendChild(d);
}
</script>

<script>
function guardar() {
  var d={}, e=document.querySelectorAll("input,textarea,select");
  for(var i=0;i<e.length;i++){if(e[i].id&&e[i].value)d[e[i].id]=e[i].value;}
  localStorage.setItem("projbl_plano",JSON.stringify(d));
  alert("Plano guardado!");
}
</script>
<script>
function lerParametros() {
  var u=new URLSearchParams(window.location.search);
  for(var p of u.entries()){
    var el=document.getElementById(p[0]);
    if(el)el.value=decodeURIComponent(p[1]);
  }
}
window.onload=lerParametros;
</script>
