<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Debrief Pedagógico — Participar</title>
<style>
:root{--red:#E31E24;--black:#111;--line:#ddd;--soft:#f7f7f7}*{box-sizing:border-box}body{margin:0;font-family:"Century Gothic",Arial,sans-serif;background:#f4f4f4;color:#191919}.wrap{max-width:720px;margin:auto;min-height:100vh;background:#fff}.head{padding:18px 20px;border-bottom:3px solid var(--red);display:flex;gap:14px;align-items:center}.head img{width:180px;max-width:44vw}.head b{display:block}.main{padding:22px}.eyebrow{font-size:12px;font-weight:800;letter-spacing:.12em;color:var(--red);text-transform:uppercase}.title{font-size:30px;line-height:1.08;margin:8px 0 8px}.desc{color:#666;line-height:1.5}.status{padding:14px;border:1px solid var(--line);border-left:5px solid var(--red);border-radius:12px;margin:18px 0;background:#fff}.choices{display:grid;gap:12px}.choice{border:2px solid #171717;background:white;border-radius:16px;padding:16px;text-align:left;font:inherit;cursor:pointer;transition:.15s}.choice:hover,.choice.selected{transform:translateY(-1px);border-color:var(--red);box-shadow:0 6px 18px #0001}.choice strong{display:block;font-size:17px}.choice span{display:block;color:#666;margin-top:5px}.submit{width:100%;margin-top:18px;padding:14px;border:0;border-radius:999px;background:var(--red);color:white;font-weight:800;font-size:16px;cursor:pointer}.submit:disabled{opacity:.4}.msg{margin-top:14px;padding:14px;border-radius:12px;background:var(--soft)}.hidden{display:none}.checkbox-choice{display:flex;gap:12px;align-items:flex-start}.long{width:100%;min-height:110px;padding:12px;border:1.5px solid #222;border-radius:12px;font:inherit}.foot{padding:20px;color:#777;font-size:12px;text-align:center}
</style>
</head><body><div class="wrap"><header class="head"><img src="assets/header_logos.png" alt="UE IADE IPAM"><div><b>Debrief Pedagógico</b><small>Práticas em Balanço</small></div></header><main class="main"><div class="eyebrow" id="institution">Sessão</div><h1 class="title" id="title">A aguardar indicação da facilitadora</h1><p class="desc" id="desc">Esta página será atualizada automaticamente quando uma atividade for aberta.</p><div class="status" id="status">A ligar à sessão…</div><div id="content"></div><div id="message" class="msg hidden"></div></main><div class="foot">Mantenha esta página aberta durante a sessão.</div></div>
<script src="config_backend.js"></script>
<script>
const $=s=>document.querySelector(s);const params=new URLSearchParams(location.search);const session=params.get('sessao')||'';
let state=null,selected=[];let device=localStorage.getItem('debrief_device');if(!device){device=(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random());localStorage.setItem('debrief_device',device)}
const moments={
 aguardar:{title:'A aguardar indicação da facilitadora',desc:'Mantenha esta página aberta. A atividade aparecerá automaticamente.'},
 cartaz:{title:'A Prática em Cartaz',desc:'Escolha o cartaz que melhor representa a sua experiência.',type:'single',question:'cartaz',options:[['plot','Plot twist: funcionou!','Correu melhor do que eu esperava.'],['plano','O plano era sólido.','A realidade tinha outras ideias — incluindo a tecnologia.'],['caos','Caos produtivo','Nem sempre parecia organizado, mas havia aprendizagem ali.'],['surpresa','Os estudantes surpreenderam-me','A turma apresentou uma solução que superou o previsto.'],['tempo','Boa prática. Pouco tempo.','A proposta funcionou; o relógio não colaborou.'],['ajustes','Voltaria a implementar — com ajustes','Repetiria, mas não exatamente da mesma forma.']]},
 plot_twist:{title:'Onde esteve o verdadeiro “plot twist”?',desc:'Escolha a dimensão mais marcante.',type:'single',question:'plot_twist',options:[['preparacao','Preparação e briefing',''],['envolvimento','Envolvimento dos estudantes',''],['tempo','Gestão do tempo',''],['grupos','Funcionamento dos grupos',''],['avaliacao','Avaliação e feedback',''],['articulacao','Articulação entre UCs/docentes',''],['tecnologia','Recursos e tecnologia','']]},
 dilema_1:{title:'Decisão pedagógica 1',desc:'Escolha a resposta que melhor representa o que faria a seguir.',type:'single',question:'dilema_1',options:[['A','Reexplicar o propósito e ligar a atividade aos resultados de aprendizagem.',''],['B','Manter a atividade e esclarecer apenas no final.',''],['C','Substituir a atividade por exposição direta.','']]},
 dilema_2:{title:'Flipped classroom: os estudantes não se prepararam',desc:'Como responde sem regressar simplesmente à aula expositiva?',type:'single',question:'dilema_2',options:[['A','Dar a matéria integralmente em formato expositivo.',''],['B','Criar uma entrada curta que permita recuperar o essencial e avançar para aplicação.',''],['C','Cancelar a atividade e remarcar.','']]},
 dilema_3:{title:'A prática é rica, mas a operação tornou-se pesada',desc:'Que decisão toma?',type:'single',question:'dilema_3',options:[['A','Manter tudo para não perder qualidade.',''],['B','Simplificar etapas e preservar apenas as evidências essenciais de aprendizagem.',''],['C','Eliminar o acompanhamento e deixar os grupos autónomos.','']]},
 dilema_4:{title:'Os estudantes pedem um exemplo completo antes de começar',desc:'Como apoia sem retirar protagonismo?',type:'single',question:'dilema_4',options:[['A','Entregar um produto final completo para replicarem.',''],['B','Disponibilizar critérios, um fragmento ou contraexemplo e perguntas de orientação.',''],['C','Recusar qualquer exemplo.','']]},
 prioridades:{title:'O que merece prioridade?',desc:'Escolha até três áreas.',type:'multi',max:3,question:'prioridades',options:[['preparacao','Preparação e envolvimento dos estudantes',''],['percurso','Clareza do percurso de aprendizagem',''],['avaliacao','Avaliação ao serviço da aprendizagem',''],['acompanhamento','Acompanhamento personalizado dos estudantes',''],['administrativo','Simplificação de processos e tarefas administrativas',''],['recursos','Recursos para docentes e estudantes',''],['articulacao','Articulação entre UCs e equipas docentes',''],['apoio','Desenvolvimento pedagógico e apoio docente',''],['ia','Tecnologia e IA com propósito pedagógico','']]},
 ultimo_frame:{title:'O último frame',desc:'Registe uma ideia em cada campo.',type:'textset',question:'ultimo_frame'}
};
async function api(payload){const ep=window.DEBRIEF_BACKEND?.endpoint;if(!ep||ep.includes('COLE_AQUI'))throw new Error('Backend ainda não configurado.');const r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!r.ok)throw new Error('Falha de comunicação.');return r.json()}
function render(s){state=s;const m=moments[s.momentoAtivo]||moments.aguardar;$('#institution').textContent=s.instituicao||'Sessão';$('#title').textContent=m.title;$('#desc').textContent=m.desc;$('#status').textContent=s.momentoAtivo==='aguardar'?'A aguardar':'Participação aberta';selected=[];const c=$('#content');c.innerHTML='';if(s.momentoAtivo==='aguardar'||!m.type)return;
 if(m.type==='single'||m.type==='multi'){const box=document.createElement('div');box.className='choices';m.options.forEach(o=>{const b=document.createElement('button');b.className='choice';b.innerHTML=`<strong>${o[1]}</strong>${o[2]?`<span>${o[2]}</span>`:''}`;b.onclick=()=>{if(m.type==='single'){selected=[o[0]];box.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')}else{if(selected.includes(o[0])){selected=selected.filter(x=>x!==o[0]);b.classList.remove('selected')}else if(selected.length<m.max){selected.push(o[0]);b.classList.add('selected')}}};box.appendChild(b)});c.appendChild(box);const sub=document.createElement('button');sub.className='submit';sub.textContent='Registar resposta';sub.onclick=()=>submit(m);c.appendChild(sub)}
 if(m.type==='textset'){c.innerHTML=`<label><strong>Manter</strong><textarea class="long" id="manter"></textarea></label><br><label><strong>Ajustar</strong><textarea class="long" id="ajustar"></textarea></label><br><label><strong>Experimentar</strong><textarea class="long" id="experimentar"></textarea></label><button class="submit" id="sendText">Registar respostas</button>`;$('#sendText').onclick=()=>submit(m)} }
async function submit(m){let answer;if(m.type==='textset'){answer=JSON.stringify({manter:$('#manter').value.trim(),ajustar:$('#ajustar').value.trim(),experimentar:$('#experimentar').value.trim()});if(answer.length<45)return show('Preencha os três campos.')}else{if(!selected.length)return show('Escolha uma opção.');answer=m.type==='multi'?JSON.stringify(selected):selected[0]}
 const sentKey=`debrief_sent_${session}_${state.momentoAtivo}_${m.question}`;if(localStorage.getItem(sentKey))return show('A sua resposta para esta atividade já foi registada neste dispositivo.');
 try{await api({acao:'registarResposta',sessao:session,momento:state.momentoAtivo,pergunta:m.question,resposta:answer,dispositivo:device,chaveResposta:`${session}|${device}|${m.question}`});localStorage.setItem(sentKey,'1');show('Resposta registada. Aguarde a próxima atividade.');$('#content').innerHTML=''}catch(e){show(e.message)} }
function show(t){const x=$('#message');x.textContent=t;x.classList.remove('hidden')}
async function poll(){if(!session){show('O link não contém o código da sessão.');return}try{const s=await api({acao:'obterEstado',sessao:session});if(!state||s.momentoAtivo!==state.momentoAtivo||s.estado!==state.estado)render(s);$('#status').textContent=s.momentoAtivo==='aguardar'?'A aguardar':'Participação aberta'}catch(e){$('#status').textContent=e.message}setTimeout(poll,window.DEBRIEF_BACKEND?.pollingMs||5000)}poll();
</script></body></html>
