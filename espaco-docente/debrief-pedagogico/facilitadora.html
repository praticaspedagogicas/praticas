<!doctype html><html lang="pt-PT"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Consola da Facilitadora — Debrief Pedagógico</title>
<style>:root{--r:#e31e24;--k:#111;--g:#f3f3f3;--l:#ddd}*{box-sizing:border-box}body{margin:0;font-family:"Century Gothic",Arial,sans-serif;background:var(--g);color:var(--k)}header{background:#fff;border-bottom:3px solid var(--r);padding:14px 20px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:3}header img{width:170px}main{max-width:1180px;margin:22px auto;padding:0 16px 50px}.grid{display:grid;grid-template-columns:360px 1fr;gap:18px}.card{background:#fff;border:1px solid var(--l);border-radius:18px;padding:18px;box-shadow:0 8px 24px #0000000a}h1{font-size:20px;margin:0}h2{font-size:18px;margin:0 0 14px}label{display:block;font-size:12px;font-weight:800;margin:12px 0 6px}select,input{width:100%;padding:11px;border:1px solid #bbb;border-radius:10px;font:inherit}.buttons{display:grid;gap:8px;margin-top:14px}.btn{border:1px solid #bbb;background:#fff;border-radius:12px;padding:11px;text-align:left;font-weight:800;cursor:pointer}.btn:hover,.btn.active{border-color:var(--r);background:#fff1f2}.btn.red{background:var(--r);color:#fff;border-color:var(--r);text-align:center}.status{margin-top:12px;padding:12px;border-radius:10px;background:#f7f7f7;border-left:5px solid var(--r);font-size:13px}.toprow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.mini{padding:9px 12px;border-radius:999px;border:1px solid #bbb;background:#fff;cursor:pointer;font-weight:700}.results{display:grid;gap:14px}.result{border:1px solid var(--l);border-radius:14px;padding:14px}.result h3{margin:0 0 10px;font-size:15px}.barrow{display:grid;grid-template-columns:minmax(150px,1fr) 3fr 42px;gap:10px;align-items:center;margin:7px 0;font-size:12px}.bar{height:13px;background:#eee;border-radius:999px;overflow:hidden}.fill{height:100%;background:var(--r)}.empty{padding:30px;text-align:center;color:#777}.linkbox{font-size:11px;word-break:break-all;background:#f7f7f7;padding:10px;border-radius:10px;margin-top:10px}.warn{background:#fff8dc;border:1px solid #ecd77b;padding:10px;border-radius:10px;font-size:12px;margin-bottom:14px}@media(max-width:850px){.grid{grid-template-columns:1fr}}</style></head>
<body><header><img src="assets/header_logos.png" alt="UE IADE IPAM"><div><h1>Consola da Facilitadora</h1><small>Debrief Pedagógico · participação ao vivo</small></div></header><main><div class="warn">Mantenha esta página numa janela não partilhada. Os docentes abrem apenas <b>participar.html?sessao=…</b>.</div><div class="grid"><section class="card"><h2>Sessão e controlo</h2><label>Sessão</label><select id="sessao"><option value="UE-20260715-1000">UE/FCST · 15/07 · 10h</option><option value="IPAM-20260715-1600">IPAM Lisboa · 15/07 · 16h</option><option value="IADE-20260716-1000">IADE · 16/07 · 10h</option></select><label>Chave da facilitadora</label><input id="chave" type="password" placeholder="Introduza a chave desta sessão"><div class="buttons" id="momentos"></div><button class="btn red" id="aguardar">Fechar participação / Aguardar</button><div class="status" id="status">A ligar ao backend…</div><label>Ligação dos docentes</label><div class="linkbox" id="link"></div><button class="mini" id="copiar">Copiar ligação</button></section><section class="card"><div class="toprow"><button class="mini" id="atualizar">Atualizar resultados</button><button class="mini" id="auto">Atualização automática: ligada</button><button class="mini" id="apresentacao">Abrir apresentação</button></div><h2>Resultados da sessão</h2><div id="results" class="results"><div class="empty">Ainda não há respostas.</div></div></section></div></main><script src="config_backend.js"></script><script>
const $=s=>document.querySelector(s);const labels={cartaz:'A Prática em Cartaz',plot_twist:'Onde esteve o plot twist?',dilema_1:'Dilema 1',dilema_2:'Dilema 2 · Flipped classroom',dilema_3:'Dilema 3 · carga operacional',dilema_4:'Dilema 4 · exemplo completo',prioridades:'Prioridades',ultimo_frame:'O último frame'};let auto=true,timer=null,current='';
async function api(payload){const r=await fetch(window.DEBRIEF_BACKEND.endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!r.ok)throw new Error(`Erro ${r.status}`);return r.json()}
function session(){return $('#sessao').value}function updateLink(){const u=new URL('participar.html',location.href);u.searchParams.set('sessao',session());$('#link').textContent=u.href}updateLink();
$('#sessao').onchange=()=>{updateLink();refreshState();refreshResults()};$('#copiar').onclick=()=>navigator.clipboard.writeText($('#link').textContent).then(()=>setStatus('Ligação copiada.'));$('#apresentacao').onclick=()=>window.open('index.html?apresentacao=1','_blank');
const box=$('#momentos');Object.entries(labels).forEach(([v,l])=>{const b=document.createElement('button');b.className='btn';b.textContent=l;b.dataset.m=v;b.onclick=()=>setMoment(v);box.appendChild(b)});$('#aguardar').onclick=()=>setMoment('aguardar');
function setStatus(t){$('#status').textContent=t}async function setMoment(m){const key=$('#chave').value.trim();if(!key)return setStatus('Introduza a chave da facilitadora.');setStatus('A atualizar…');try{const x=await api({acao:'alterarMomento',sessao:session(),chaveFacilitadora:key,momento:m});current=x.momentoAtivo||m;paint();setStatus(`Momento ativo: ${current}`);setTimeout(refreshResults,700)}catch(e){setStatus(`Falha: ${e.message}`)}}
function paint(){document.querySelectorAll('[data-m]').forEach(b=>b.classList.toggle('active',b.dataset.m===current))}
async function refreshState(){try{const x=await api({acao:'obterEstado',sessao:session()});current=x.momentoAtivo||'aguardar';paint();setStatus(`${x.instituicao} · momento: ${current}`)}catch(e){setStatus(`Falha ao obter estado: ${e.message}`)}}
function clean(v){if(typeof v!=='string')return String(v??'');try{const a=JSON.parse(v);return Array.isArray(a)?a.join(', '):Object.entries(a).map(([k,x])=>`${k}: ${x}`).join(' · ')}catch{return v}}
async function refreshResults(){try{const rows=await api({acao:'obterResultados',sessao:session()});render(Array.isArray(rows)?rows:rows.respostas||[])}catch(e){$('#results').innerHTML=`<div class="empty">Falha ao obter resultados: ${e.message}</div>`}}
function render(rows){if(!rows.length){$('#results').innerHTML='<div class="empty">Ainda não há respostas.</div>';return}const groups={};for(const r of rows){const q=r.Pergunta||r.pergunta||'Sem pergunta';const a=clean(r.Resposta||r.resposta||'');(groups[q]??={total:0,counts:{}});groups[q].total++;groups[q].counts[a]=(groups[q].counts[a]||0)+1}$('#results').innerHTML=Object.entries(groups).map(([q,g])=>{const max=Math.max(...Object.values(g.counts));return `<div class="result"><h3>${labels[q]||q} · ${g.total} resposta(s)</h3>${Object.entries(g.counts).sort((a,b)=>b[1]-a[1]).map(([a,n])=>`<div class="barrow"><span>${a}</span><div class="bar"><div class="fill" style="width:${n/max*100}%"></div></div><b>${n}</b></div>`).join('')}</div>`}).join('')}
$('#atualizar').onclick=refreshResults;$('#auto').onclick=()=>{auto=!auto;$('#auto').textContent=`Atualização automática: ${auto?'ligada':'desligada'}`};setInterval(()=>{if(auto)refreshResults()},5000);refreshState();refreshResults();
</script></body></html>
