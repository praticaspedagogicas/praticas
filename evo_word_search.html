<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVO - Sopa de Palabras</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --gold: #f0b429;
            --accent: #58a6ff;
            --found: #3fb950;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--gold);
        }
        
        header .tagline {
            color: var(--muted);
            font-size: 14px;
            margin-top: 5px;
        }
        
        .game-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .game-info span {
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        #word-matrix {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: var(--surface);
            padding: 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
        }
        
        .cell {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            background: var(--bg);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }
        
        .cell:hover {
            background: var(--surface);
            transform: scale(1.1);
        }
        
        .cell.selected {
            background: var(--gold);
            color: var(--bg);
        }
        
        .cell.found {
            background: var(--found);
            color: var(--bg);
        }
        
        #word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 400px;
            justify-content: center;
        }
        
        .word-item {
            background: var(--surface);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        
        .word-item.found {
            background: var(--found);
            color: var(--bg);
            border-color: var(--found);
        }
        
        button {
            background: var(--gold);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.15s ease;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        #message {
            margin-top: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            display: none;
        }
        
        #message.show {
            display: block;
        }
        
        #message.success {
            background: var(--found);
            color: var(--bg);
        }
        
        #message.win {
            background: var(--gold);
            color: var(--bg);
            font-size: 24px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🔥 EVO - Sopa de Palabras</h1>
        <p class="tagline">Encuentra las palabras en español</p>
    </header>
    
    <div class="game-info">
        <span>Palabras: <strong id="found-count">0</strong>/<strong id="total-count">5</strong></span>
        <span>Tiempo: <strong id="timer">0:00</strong></span>
    </div>
    
    <div id="game-container">
        <div id="word-matrix"></div>
        <div id="word-list"></div>
    </div>
    
    <button onclick="newGame()">Nuevo Juego</button>
    
    <div id="message"></div>

    <script>
        // Vocabulary from EVO Wordle
        var ALL_WORDS = ['acabó', 'adiós', 'algún', 'andré', 'atrás', 'ayudó', 'añejo', 'bahía', 'borró', 'botón', 'cansé', 'cantó', 'cobré', 'cogía', 'césar', 'daría', 'darío', 'decía', 'demás', 'dueño', 'dónde', 'elías', 'espía', 'están', 'estás', 'estén', 'estés', 'falló', 'forró', 'fríos', 'fábio', 'fácil', 'fénix', 'grabé', 'había', 'hacés', 'hacía', 'haría', 'jamás', 'jesús', 'limón', 'llamó', 'llegó', 'lucía', 'lápiz', 'línea', 'lópez', 'magín', 'mandé', 'maría', 'metío', 'montó', 'murió', 'niños', 'nadar', 'ojalá', 'ortíz', 'otoño', 'oíste', 'oñate', 'peleé', 'pensé', 'perdí', 'podré', 'podés', 'podía', 'pérez', 'quedó', 'quité', 'quién', 'ramón', 'ratón', 'razón', 'rompí', 'rubén', 'sabía', 'salió', 'saltó', 'salvó', 'salón', 'saqué', 'saraí', 'seguí', 'sentí', 'serán', 'sería', 'simón', 'sofía', 'solía', 'solís', 'soñar', 'sueñe', 'sueño', 'tañón', 'tenés', 'tenía', 'tingó', 'trapé', 'vacía', 'vacío', 'valía', 'venío', 'verás', 'zenón', 'ácido', 'álbum', 'ángel', 'épico', 'érika', 'éxito', 'única', 'único'];
        
        const GRID_SIZE = 10;
        const WORD_COUNT = 5;
        const DIRECTIONS = [
            [0, 1],   // horizontal
            [1, 0],   // vertical
            [1, 1],   // diagonal
            [1, -1]   // diagonal reverse
        ];
        
        let grid = [];
        let words = [];
        let foundWords = [];
        let selectedCells = [];
        let startCell = null;
        let isSelecting = false;
        let startTime = Date.now();
        let timerInterval = null;
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function canPlaceWord(word, row, col, dir) {
            const [dr, dc] = dir;
            for (let i = 0; i < word.length; i++) {
                const r = row + dr * i;
                const c = col + dc * i;
                if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return false;
                if (grid[r][c] && grid[r][c] !== word[i]) return false;
            }
            return true;
        }
        
        function placeWord(word, row, col, dir) {
            const [dr, dc] = dir;
            for (let i = 0; i < word.length; i++) {
                grid[row + dr * i][col + dc * i] = word[i];
            }
        }
        
        function generateGrid() {
            grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(''));
            words = [];
            
            const shuffledWords = shuffle([...ALL_WORDS]).slice(0, 30);
            
            for (const word of shuffledWords) {
                if (words.length >= WORD_COUNT) break;
                
                const shuffledDirs = shuffle([...DIRECTIONS]);
                for (const dir of shuffledDirs) {
                    for (let r = 0; r < GRID_SIZE; r++) {
                        for (let c = 0; c < GRID_SIZE; c++) {
                            if (canPlaceWord(word, r, c, dir)) {
                                placeWord(word, r, c, dir);
                                words.push(word);
                                break;
                            }
                        }
                        if (words.includes(word)) break;
                    }
                    if (words.includes(word)) break;
                }
            }
            
            // Fill empty cells
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWYZÁÉÍÓÚÑ';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (!grid[r][c]) {
                        grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
                    }
                }
            }
            
            words = shuffle(words);
        }
        
        function renderGrid() {
            const container = document.getElementById('word-matrix');
            container.innerHTML = '';
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = grid[r][c];
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('mousedown', handleMouseDown);
                    cell.addEventListener('mouseover', handleMouseOver);
                    cell.addEventListener('mouseup', handleMouseUp);
                    container.appendChild(cell);
                }
            }
            
            // Touch support
            container.addEventListener('touchstart', handleTouchStart, { passive: false });
            container.addEventListener('touchmove', handleTouchMove, { passive: false });
            container.addEventListener('touchend', handleTouchEnd);
        }
        
        function renderWordList() {
            const container = document.getElementById('word-list');
            container.innerHTML = '';
            
            words.forEach(word => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.textContent = word.toUpperCase();
                item.dataset.word = word;
                container.appendChild(item);
            });
            
            document.getElementById('total-count').textContent = words.length;
        }
        
        function handleMouseDown(e) {
            isSelecting = true;
            startCell = {
                row: parseInt(e.target.dataset.row),
                col: parseInt(e.target.dataset.col)
            };
            selectCells(startCell, startCell);
        }
        
        function handleMouseOver(e) {
            if (isSelecting && startCell) {
                const currentCell = {
                    row: parseInt(e.target.dataset.row),
                    col: parseInt(e.target.dataset.col)
                };
                selectCells(startCell, currentCell);
            }
        }
        
        function handleMouseUp() {
            isSelecting = false;
            checkSelection();
        }
        
        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const cell = document.elementFromPoint(touch.clientX, touch.clientY);
            if (cell && cell.classList.contains('cell')) {
                isSelecting = true;
                startCell = {
                    row: parseInt(cell.dataset.row),
                    col: parseInt(cell.dataset.col)
                };
                selectCells(startCell, startCell);
            }
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            if (isSelecting && startCell) {
                const touch = e.touches[0];
                const cell = document.elementFromPoint(touch.clientX, touch.clientY);
                if (cell && cell.classList.contains('cell')) {
                    const currentCell = {
                        row: parseInt(cell.dataset.row),
                        col: parseInt(cell.dataset.col)
                    };
                    selectCells(startCell, currentCell);
                }
            }
        }
        
        function handleTouchEnd() {
            isSelecting = false;
            checkSelection();
        }
        
        function selectCells(start, end) {
            const cells = document.querySelectorAll('.cell.selected');
            cells.forEach(c => c.classList.remove('selected'));
            selectedCells = [];
            
            const dr = end.row - start.row;
            const dc = end.col - start.col;
            
            if (dr === 0 && dc === 0) {
                const cell = getCell(start.row, start.col);
                cell.classList.add('selected');
                selectedCells.push({ ...start, letter: grid[start.row][start.col] });
                return;
            }
            
            const steps = Math.max(Math.abs(dr), Math.abs(dc));
            const stepR = dr === 0 ? 0 : dr / steps;
            const stepC = dc === 0 ? 0 : dc / steps;
            
            for (let i = 0; i <= steps; i++) {
                const r = start.row + stepR * i;
                const c = start.col + stepC * i;
                const cell = getCell(r, c);
                cell.classList.add('selected');
                selectedCells.push({ row: r, col: c, letter: grid[r][c] });
            }
        }
        
        function getCell(row, col) {
            return document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
        }
        
        function checkSelection() {
            const selectedWord = selectedCells.map(c => c.letter.toLowerCase()).join('');
            const reversedWord = selectedCells.map(c => c.letter.toLowerCase()).reverse().join('');
            
            const matchedWord = words.find(w => w === selectedWord || w === reversedWord);
            
            if (matchedWord && !foundWords.includes(matchedWord)) {
                foundWords.push(matchedWord);
                selectedCells.forEach(c => {
                    const cell = getCell(c.row, c.col);
                    cell.classList.remove('selected');
                    cell.classList.add('found');
                });
                
                document.querySelector(`.word-item[data-word="${matchedWord}"]`).classList.add('found');
                document.getElementById('found-count').textContent = foundWords.length;
                
                if (foundWords.length === words.length) {
                    winGame();
                }
            } else {
                selectedCells.forEach(c => {
                    const cell = getCell(c.row, c.col);
                    cell.classList.remove('selected');
                });
            }
            
            selectedCells = [];
            startCell = null;
        }
        
        function newGame() {
            generateGrid();
            renderGrid();
            renderWordList();
            foundWords = [];
            document.getElementById('found-count').textContent = '0';
            document.getElementById('message').classList.remove('show');
            
            startTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
        }
        
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('timer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function winGame() {
            clearInterval(timerInterval);
            const message = document.getElementById('message');
            message.textContent = `🎉 Ganaste! ${foundWords.length}/${words.length} palabras!`;
            message.className = 'show win';
        }
        
        // Start game
        newGame();
    </script>
</body>
</html>
