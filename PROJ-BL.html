<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<script>
var qs = window.location.search.slice(1);
var itemId = '';
qs.split('&').forEach(function(p){
  var kv = p.split('=');
  if(kv[0]==='itemId') itemId = kv[1];
});
var target = 'Proj-BL.html' + (itemId ? '?itemId='+itemId : '');
window.location.replace(target);
</script>
</head>
<body>
<p>Redirecionando...</p>
</body>
</html>
